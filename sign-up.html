<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Trackr</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo-icon">
        <img
          src="https://github.com/user-attachments/assets/76478139-5c51-41f8-abbb-b20602a6f355"
          alt="Florida Atlantic University logo"
          class="logo-image"
        />
      </div>
      <h1>Trackr</h1>
      <p class="subtitle">Create your account</p>
    </div>
  </header>

  <main>
    <section class="card" id="signup-section">
      <h2>Sign Up</h2>
      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary" id="signup-btn">Create Account</button>
        <p class="form-error" id="form-error" role="alert" aria-live="polite"></p>
      </form>
      <p class="signup-back"><a href="index.html">← Back to Trackr</a></p>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Trackr</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
