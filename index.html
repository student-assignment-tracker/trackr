<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackr – Student Assignment Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
             role="img" aria-label="Trackr logo"
             fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <h1>Trackr</h1>
      <p class="subtitle">Stay on top of your assignments</p>
      <div class="header-actions">
        <a href="sign-up.html" class="btn btn-secondary">Sign Up</a>
      </div>
    </div>
  </header>

  <main>
    <!-- Add Assignment Form -->
    <section class="card" id="add-section">
      <h2>Add Assignment</h2>
      <form id="assignment-form" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="title">Title <span class="required">*</span></label>
            <input
              type="text"
              id="title"
              name="title"
              placeholder="e.g. Math Homework Chapter 5"
              required
              maxlength="120"
            />
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input
              type="text"
              id="subject"
              name="subject"
              placeholder="e.g. Mathematics"
              maxlength="60"
            />
          </div>
          <div class="form-group">
            <label for="due-date">Due Date</label>
            <input type="date" id="due-date" name="due-date" />
          </div>
          <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea
              id="notes"
              name="notes"
              rows="2"
              placeholder="Optional notes…"
              maxlength="300"
            ></textarea>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Assignment</button>
        <p class="form-error" id="form-error" role="alert" aria-live="polite"></p>
      </form>
    </section>

    <!-- Filters & Stats -->
    <section class="controls">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <div class="controls-right">
        <select id="sort-select" class="sort-select" aria-label="Sort assignments">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="due-date">By due date</option>
          <option value="priority">By priority</option>
          <option value="title">By title</option>
        </select>
        <button id="clear-completed" class="btn btn-sm btn-danger-soft" style="display:none">Clear done</button>
        <div class="stats" id="stats" aria-live="polite"></div>
      </div>
    </section>
    <div class="progress-section" id="progress-wrap" style="display:none">
      <div class="progress-label">
        <span>Progress</span>
        <span class="progress-label-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar"
             role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>

    <!-- Assignment List -->
    <section id="list-section">
      <ul id="assignment-list" aria-label="Assignment list"></ul>
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
               role="img" aria-label="No assignments"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18"/>
            <path d="M9 21V9"/>
          </svg>
        </div>
        <strong>No assignments yet</strong>
        <span>Add your first assignment using the form above!</span>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Trackr</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
